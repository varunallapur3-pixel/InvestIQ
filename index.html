<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvestIQ | Wealth Intelligence & Precision SIP Planning Platform</title>
  <meta name="description" content="Calculate SIP returns, plan retirement, compare asset classes, and build long-term wealth with audited financial projections."/>
  
  <!-- Fonts & Material Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#0c1324",
            "surface-light": "#f4f6fb",
            "surface-container": "#191f31",
            "surface-container-high": "#23293c",
            "surface-container-lowest": "#070d1f",
            "primary": "#4edea3",
            "primary-container": "#10b981",
            "primary-fixed": "#6ffbbe",
            "secondary": "#b8c4ff",
            "secondary-container": "#173bab",
            "tertiary": "#ffb95f",
            "tertiary-container": "#e29100",
            "on-surface": "#dce1fb",
            "on-surface-variant": "#bbcabf",
            "error": "#ffb4ab"
          },
          fontFamily: {
            "display": ["Geist", "sans-serif"],
            "headline": ["Geist", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"]
          }
        }
      }
    }
  </script>

  <!-- External Visual & PDF Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Animated CSS Background — replaces video, zero assets, instant load */
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes orb1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(60px, -40px) scale(1.15); }
      66%       { transform: translate(-30px, 50px) scale(0.9); }
    }
    @keyframes orb2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-50px, 30px) scale(1.1); }
      66%       { transform: translate(40px, -60px) scale(0.95); }
    }
    @keyframes orb3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(30px, 40px) scale(1.2); }
    }
    #bg-canvas {
      background: linear-gradient(135deg, #070d1f 0%, #0c1324 40%, #0e1a2e 70%, #070d1f 100%);
      background-size: 400% 400%;
      animation: bgShift 18s ease infinite;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .bg-orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(78,222,163,0.13) 0%, transparent 70%);
      top: -120px; left: -80px;
      animation: orb1 14s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(184,196,255,0.10) 0%, transparent 70%);
      bottom: 10%; right: -100px;
      animation: orb2 17s ease-in-out infinite;
    }
    .bg-orb-3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(255,185,95,0.07) 0%, transparent 70%);
      top: 40%; left: 35%;
      animation: orb3 20s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen relative overflow-x-hidden">
  
  <!-- Global CSS Animated Background (no video assets needed) -->
  <div id="bg-canvas" class="fixed inset-0 w-full h-full pointer-events-none z-0 overflow-hidden">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-surface/80 via-surface/20 to-transparent pointer-events-none"></div>

    <!-- Ambient Stock Ticker Stream Loop -->
    <div class="absolute bottom-0 left-0 w-full bg-surface-container-lowest/80 border-t border-white/10 py-1.5 overflow-hidden z-10 backdrop-blur-md">
      <div id="ambient-ticker-content" class="whitespace-nowrap flex gap-12 font-mono text-[11px] text-on-surface-variant animate-marquee">
        <!-- Dynamically injected financial ticker items -->
      </div>
    </div>
  </div>

  <!-- Main Top App Navigation Shell -->
  <header id="top-nav-shell" class="fixed top-0 left-0 w-full z-50 border-b border-white/10 glass-nav transition-all duration-300 h-16 flex justify-between items-center px-4 sm:px-8"></header>

  <!-- Router View Area -->
  <main id="app-view" class="relative z-10 min-h-screen"></main>

  <!-- Floating Bottom Navigation Bar for Mobile -->
  <nav id="bottom-nav-pill" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-32px)] max-w-lg rounded-full border border-white/10 glass-nav shadow-[0_20px_50px_-12px_rgba(0,0,0,0.8)] h-16 flex justify-around items-center px-4 md:hidden"></nav>

  <!-- Global AI Assistant Chatbot Floating Container -->
  <div id="ai-assistant-container" class="fixed bottom-24 right-4 sm:right-8 z-40"></div>

  <!-- Router Script -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
